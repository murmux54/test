<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #37352f;
    --sub: #9b9a97;
    --line: #e3e2e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --fg: #d4d4d4;
      --sub: #7f7f7f;
      --line: #2f2f2f;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 360px;
    padding: 10px 16px;
    text-align: center;
  }
  .place {
    font-size: clamp(11px, 4vw, 13px);
    color: var(--sub);
    letter-spacing: 0.14em;
    margin-bottom: 4px;
  }
  .now {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }
  .icon { font-size: clamp(30px, 12vw, 44px); line-height: 1; }
  .temp {
    font-size: clamp(34px, 16vw, 56px);
    font-weight: 300;
    font-variant-numeric: tabular-nums;
    line-height: 1.1;
  }
  .temp small { font-size: 0.45em; font-weight: 400; color: var(--sub); }
  .desc {
    font-size: clamp(12px, 4.5vw, 15px);
    margin-top: 2px;
  }
  .range {
    display: flex;
    justify-content: center;
    gap: 18px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    font-size: clamp(11px, 4vw, 13px);
    color: var(--sub);
    font-variant-numeric: tabular-nums;
  }
  .range b { color: var(--fg); font-weight: 500; }
  .error { color: var(--sub); font-size: 13px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="place">FUKUOKA</div>
    <div class="error" id="loading">読み込み中…</div>
  </div>
<script>
  // 場所を変えたいときはここの緯度・経度を書き換えてください(現在: 福岡市中央区付近)
  const LAT = 33.57;
  const LON = 130.40;

  // WMO天気コード → 表示
  const WEATHER = {
    0:  ["☀️", "快晴"],   1:  ["🌤️", "晴れ"],   2:  ["⛅", "晴れ時々曇り"],
    3:  ["☁️", "曇り"],   45: ["🌫️", "霧"],     48: ["🌫️", "霧氷"],
    51: ["🌦️", "霧雨"],   53: ["🌦️", "霧雨"],   55: ["🌧️", "強い霧雨"],
    61: ["🌧️", "小雨"],   63: ["🌧️", "雨"],     65: ["🌧️", "大雨"],
    66: ["🌧️", "着氷性の雨"], 67: ["🌧️", "着氷性の雨"],
    71: ["🌨️", "小雪"],   73: ["🌨️", "雪"],     75: ["❄️", "大雪"],
    77: ["❄️", "細氷"],   80: ["🌦️", "にわか雨"], 81: ["🌧️", "にわか雨"],
    82: ["⛈️", "激しいにわか雨"],
    85: ["🌨️", "にわか雪"], 86: ["🌨️", "強いにわか雪"],
    95: ["⛈️", "雷雨"],   96: ["⛈️", "雷雨(ひょう)"], 99: ["⛈️", "激しい雷雨"]
  };

  async function load() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
      + `&current=temperature_2m,weather_code`
      + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max`
      + `&timezone=Asia%2FTokyo&forecast_days=1`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      const [icon, desc] = WEATHER[d.current.weather_code] || ["🌡️", "—"];
      document.getElementById("card").innerHTML = `
        <div class="place">FUKUOKA</div>
        <div class="now">
          <div class="icon">${icon}</div>
          <div class="temp">${Math.round(d.current.temperature_2m)}<small>°C</small></div>
        </div>
        <div class="desc">${desc}</div>
        <div class="range">
          <span>最高 <b>${Math.round(d.daily.temperature_2m_max[0])}°</b></span>
          <span>最低 <b>${Math.round(d.daily.temperature_2m_min[0])}°</b></span>
          <span>降水 <b>${d.daily.precipitation_probability_max[0]}%</b></span>
        </div>`;
    } catch (e) {
      document.getElementById("loading").textContent = "天気を取得できませんでした";
    }
  }

  load();
  setInterval(load, 30 * 60 * 1000); // 30分ごとに更新
</script>
</body>
</html>
