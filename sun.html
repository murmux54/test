<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sun</title>
<style>
  :root {
    --bg: #ffffff;
    --fg: #37352f;
    --sub: #9b9a97;
    --line: #e3e2e0;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #191919;
      --fg: #d4d4d4;
      --sub: #7f7f7f;
      --line: #2f2f2f;
    }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; background: var(--bg); }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans",
                 "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Meiryo", sans-serif;
    color: var(--fg);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card {
    width: 100%;
    max-width: 360px;
    padding: 10px 16px;
    text-align: center;
  }
  .place {
    font-size: clamp(11px, 4vw, 13px);
    color: var(--sub);
    letter-spacing: 0.14em;
    margin-bottom: 2px;
  }
  .sky { width: 100%; max-width: 240px; margin: 0 auto; display: block; }
  .times {
    display: flex;
    justify-content: center;
    gap: 22px;
    margin-top: 2px;
    font-size: clamp(12px, 4.5vw, 14px);
    font-variant-numeric: tabular-nums;
  }
  .times .t { display: flex; align-items: center; gap: 6px; }
  .times svg { width: 18px; height: 18px; color: var(--sub); }
  .daylen {
    margin-top: 8px;
    padding-top: 8px;
    border-top: 1px solid var(--line);
    font-size: clamp(11px, 4vw, 13px);
    color: var(--sub);
    font-variant-numeric: tabular-nums;
  }
  .daylen b { color: var(--fg); font-weight: 500; }
  .error { color: var(--sub); font-size: 13px; }
</style>
</head>
<body>
  <div class="card" id="card">
    <div class="place">FUKUOKA</div>
    <div class="error" id="loading">読み込み中…</div>
  </div>
<script>
  // 場所を変えたいときはここの緯度・経度を書き換えてください(現在: 福岡市中央区付近)
  const LAT = 33.57;
  const LON = 130.40;

  const S = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">';
  const RISE = S + '<path d="M12 2v6"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m8 6 4-4 4 4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>';
  const SET  = S + '<path d="M12 10V2"/><path d="m4.93 10.93 1.41 1.41"/><path d="M2 18h2"/><path d="M20 18h2"/><path d="m19.07 10.93-1.41 1.41"/><path d="M22 22H2"/><path d="m16 6-4 4-4-4"/><path d="M16 18a4 4 0 0 0-8 0"/></svg>';

  const pad = n => String(n).padStart(2, "0");
  const hm = d => `${pad(d.getHours())}:${pad(d.getMinutes())}`;

  let sunrise = null, sunset = null;

  function drawSky() {
    // 弧の上に現在の太陽位置を描く
    const now = new Date();
    const t = (now - sunrise) / (sunset - sunrise); // 0=日の出, 1=日の入り
    const day = t >= 0 && t <= 1;
    const tc = Math.min(1, Math.max(0, t));
    const x = 100 - 80 * Math.cos(Math.PI * tc);
    const y = 92 - 78 * Math.sin(Math.PI * tc);
    return `
      <svg class="sky" viewBox="0 0 200 104" xmlns="http://www.w3.org/2000/svg">
        <path d="M20,92 A80,78 0 0 1 180,92" fill="none"
              stroke="var(--line)" stroke-width="1.5" stroke-dasharray="3 4"/>
        <line x1="8" y1="92" x2="192" y2="92" stroke="var(--sub)" stroke-width="1.5"/>
        ${day ? `
          <circle cx="${x}" cy="${y}" r="6" fill="var(--bg)"
                  stroke="var(--fg)" stroke-width="1.5"/>
          <g stroke="var(--fg)" stroke-width="1.2" stroke-linecap="round">
            <line x1="${x}" y1="${y-10}" x2="${x}" y2="${y-13}"/>
            <line x1="${x}" y1="${y+10}" x2="${x}" y2="${y+13}"/>
            <line x1="${x-10}" y1="${y}" x2="${x-13}" y2="${y}"/>
            <line x1="${x+10}" y1="${y}" x2="${x+13}" y2="${y}"/>
          </g>` : `
          <path d="M104 40a9 9 0 1 1-9-12 7 7 0 0 0 9 12Z" fill="none"
                stroke="var(--sub)" stroke-width="1.5" stroke-linejoin="round"/>`}
      </svg>`;
  }

  function render() {
    if (!sunrise) return;
    const ms = sunset - sunrise;
    const h = Math.floor(ms / 3600000);
    const m = Math.round((ms % 3600000) / 60000);
    document.getElementById("card").innerHTML = `
      <div class="place">FUKUOKA</div>
      ${drawSky()}
      <div class="times">
        <span class="t">${RISE}${hm(sunrise)}</span>
        <span class="t">${SET}${hm(sunset)}</span>
      </div>
      <div class="daylen">昼の長さ <b>${h}時間${pad(m)}分</b></div>`;
  }

  async function load() {
    const url = `https://api.open-meteo.com/v1/forecast?latitude=${LAT}&longitude=${LON}`
      + `&daily=sunrise,sunset&timezone=Asia%2FTokyo&forecast_days=1`;
    try {
      const res = await fetch(url);
      if (!res.ok) throw new Error(res.status);
      const d = await res.json();
      sunrise = new Date(d.daily.sunrise[0]);
      sunset = new Date(d.daily.sunset[0]);
      render();
    } catch (e) {
      document.getElementById("loading").textContent = "データを取得できませんでした";
    }
  }

  load();
  setInterval(render, 60 * 1000);        // 太陽の位置は1分ごとに更新
  setInterval(load, 6 * 60 * 60 * 1000); // 日の出入り時刻は6時間ごとに再取得
</script>
</body>
</html>
